<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Notion Import</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --background: #fafafa;
  --foreground: #1a1a1a;
  --accent: #3b82f6;
  --accent-dark: #2563eb;
  --muted: #6b7280;
  --border: #e5e7eb;
  --card: #ffffff;
  --sidebar: #f3f4f6;
  --sidebar-w: 340px;
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
}
.dark {
  --background: #0a0a0a;
  --foreground: #e5e5e5;
  --accent: #60a5fa;
  --accent-dark: #3b82f6;
  --muted: #9ca3af;
  --border: #1f2937;
  --card: #111827;
  --sidebar: #0f172a;
}

body {
  background: var(--background);
  color: var(--foreground);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 13px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Topbar ── */
.topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 10;
}
.topbar-title { font-weight: 600; font-size: 13px; color: var(--foreground); margin-right: auto; }
.topbar-title span { color: var(--accent); }
.nav-link {
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 12px;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.15s;
}
.nav-link:hover { border-color: var(--accent); color: var(--accent); }

.btn {
  padding: 5px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--background);
  color: var(--foreground);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover:not(:disabled) { background: var(--accent-dark); border-color: var(--accent-dark); color: #fff; }
.btn-sm { padding: 3px 10px; font-size: 11px; }
.btn-success { background: var(--success); color: #fff; border-color: var(--success); }

/* ── Layout ── */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Left panel ── */
.left-panel {
  width: var(--sidebar-w);
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}

.panel-section {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
}
.panel-section-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; }

input[type=text], textarea, select {
  width: 100%;
  padding: 6px 8px;
  border: 1px solid var(--border);
  border-radius: 5px;
  background: var(--card);
  color: var(--foreground);
  font-size: 12px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s;
}
input[type=text]:focus, textarea:focus, select:focus { border-color: var(--accent); }

.token-row { display: flex; gap: 6px; }
.token-row input { flex: 1; font-family: ui-monospace, monospace; font-size: 11px; }

.status-dot {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--muted);
  margin-right: 5px;
}
.status-dot.ok { background: var(--success); }
.status-dot.err { background: var(--danger); }

/* ── Page list ── */
.page-list-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.page-item {
  padding: 8px 14px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.12s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.page-item:hover { background: color-mix(in srgb, var(--accent) 8%, transparent); }
.page-item.active {
  border-left-color: var(--accent);
  background: color-mix(in srgb, var(--accent) 10%, transparent);
}
.page-item-title {
  font-size: 12px;
  color: var(--foreground);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.page-item-date { font-size: 10px; color: var(--muted); flex-shrink: 0; }

.empty-state {
  padding: 24px 14px;
  text-align: center;
  color: var(--muted);
  font-size: 12px;
}

/* ── Search ── */
.search-wrap { padding: 8px 14px; border-bottom: 1px solid var(--border); }
.search-wrap input { font-size: 12px; }

/* ── Right panel ── */
.right-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.preview-header {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--card);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.preview-title { font-weight: 600; font-size: 14px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Frontmatter editor ── */
.fm-editor {
  background: var(--sidebar);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: none;
  flex-shrink: 0;
}
.fm-editor.visible { display: block; }
.fm-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}
.fm-grid-full { grid-column: 1 / -1; }
.fm-field label { font-size: 10px; color: var(--muted); display: block; margin-bottom: 3px; }
.fm-field input { font-size: 11px; }

/* ── Preview body ── */
.preview-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px;
}
.preview-body.prose {
  max-width: 720px;
  margin: 0 auto;
}
.preview-body h1, .preview-body h2, .preview-body h3 { margin: 1.2em 0 0.4em; font-weight: 600; }
.preview-body h1 { font-size: 1.6em; }
.preview-body h2 { font-size: 1.3em; }
.preview-body h3 { font-size: 1.1em; }
.preview-body p { margin-bottom: 0.9em; line-height: 1.7; }
.preview-body code { background: color-mix(in srgb, var(--accent) 10%, transparent); padding: 1px 5px; border-radius: 3px; font-size: 0.88em; font-family: ui-monospace, monospace; }
.preview-body pre { background: #1e1e1e; color: #d4d4d4; padding: 12px 16px; border-radius: 6px; overflow-x: auto; margin-bottom: 1em; }
.preview-body pre code { background: none; padding: 0; color: inherit; }
.preview-body blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--muted); margin-bottom: 1em; }
.preview-body img { max-width: 100%; border-radius: 6px; }
.preview-body ul, .preview-body ol { padding-left: 1.5em; margin-bottom: 0.9em; }
.preview-body li { line-height: 1.6; }
.preview-body hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }
.preview-body a { color: var(--accent); }

.placeholder-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--muted);
  gap: 10px;
  font-size: 13px;
}
.placeholder-state .icon { font-size: 36px; opacity: 0.4; }

/* ── Progress / toast ── */
.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 10px 16px;
  border-radius: 8px;
  background: var(--card);
  border: 1px solid var(--border);
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  font-size: 12px;
  z-index: 100;
  max-width: 360px;
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.2s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
.toast.success { border-color: var(--success); color: var(--success); }
.toast.error { border-color: var(--danger); color: var(--danger); }
.toast.loading { border-color: var(--accent); color: var(--accent); }

/* ── Modal ── */
.modal-backdrop {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-backdrop.show { display: flex; }
.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 24px;
  max-width: 420px;
  width: 90%;
}
.modal h3 { margin-bottom: 10px; font-size: 14px; }
.modal p { color: var(--muted); font-size: 12px; margin-bottom: 16px; line-height: 1.6; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* ── Dark mode toggle ── */
.theme-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 8px;
  cursor: pointer;
  font-size: 14px;
}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-title">Dev Tools / <span>Notion Import</span></div>
  <a class="nav-link" href="/editor">← Post Editor</a>
  <button class="theme-btn" id="themeBtn" title="Toggle theme">🌙</button>
</div>

<!-- Layout -->
<div class="layout">

  <!-- Left panel: connection + page list -->
  <div class="left-panel">

    <!-- Token -->
    <div class="panel-section">
      <div class="panel-section-title">Notion 連線</div>
      <div class="token-row">
        <input type="text" id="tokenInput" placeholder="ntn_xxxx... 或 secret_xxxx..." />
        <button class="btn btn-sm btn-primary" id="connectBtn">連線</button>
      </div>
      <div style="margin-top:8px; display:flex; align-items:center; font-size:11px; color:var(--muted);">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">未連線</span>
      </div>
      <div style="margin-top:8px; font-size:10px; color:var(--muted); line-height:1.5;">
        Token 只存在當前 session，不寫入磁碟。
      </div>
    </div>

    <!-- Database selector -->
    <div class="panel-section" id="dbSection" style="display:none;">
      <div class="panel-section-title">選擇資料庫</div>
      <select id="dbSelect">
        <option value="">— 選擇資料庫 —</option>
      </select>
      <div style="margin-top:8px; display:flex; gap:6px;">
        <button class="btn btn-sm" id="loadPagesBtn" style="flex:1;">載入文章</button>
        <button class="btn btn-sm" id="searchModeBtn" style="flex:1;">搜尋頁面</button>
      </div>
    </div>

    <!-- Search bar -->
    <div class="search-wrap" id="searchWrap" style="display:none;">
      <input type="text" id="searchInput" placeholder="搜尋 Notion 頁面..." />
    </div>

    <!-- Page list -->
    <div class="page-list-wrap" id="pageListWrap">
      <div class="empty-state" id="listEmpty">連線後選擇資料庫以瀏覽文章</div>
    </div>

  </div>

  <!-- Right panel: preview + import -->
  <div class="right-panel">

    <!-- Preview header -->
    <div class="preview-header" id="previewHeader" style="display:none;">
      <div class="preview-title" id="previewTitle">—</div>
      <button class="btn btn-sm" id="reloadPreviewBtn">重新載入</button>
      <button class="btn btn-sm btn-primary" id="importBtn">匯入到 Blog →</button>
    </div>

    <!-- Frontmatter editor -->
    <div class="fm-editor" id="fmEditor">
      <div class="fm-grid">
        <div class="fm-field">
          <label>標題</label>
          <input type="text" id="fmTitle" />
        </div>
        <div class="fm-field">
          <label>Slug（檔名）</label>
          <input type="text" id="fmSlug" style="font-family:ui-monospace,monospace;" />
        </div>
        <div class="fm-field">
          <label>日期</label>
          <input type="text" id="fmDate" placeholder="YYYY-MM-DD" />
        </div>
        <div class="fm-field fm-grid-full">
          <label>Description</label>
          <input type="text" id="fmDescription" />
        </div>
        <div class="fm-field">
          <label>Tags（逗號分隔）</label>
          <input type="text" id="fmTags" />
        </div>
        <div class="fm-field">
          <label>Categories（逗號分隔）</label>
          <input type="text" id="fmCategories" />
        </div>
        <div class="fm-field">
          <label>Cover 圖片路徑</label>
          <input type="text" id="fmCover" placeholder="/images/posts/covers/..." />
        </div>
      </div>
    </div>

    <!-- Preview body -->
    <div class="preview-body prose" id="previewBody">
      <div class="placeholder-state">
        <div class="icon">📄</div>
        <div>從左側選擇一篇 Notion 文章開始預覽</div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Overwrite modal -->
<div class="modal-backdrop" id="overwriteModal">
  <div class="modal">
    <h3>⚠️ 文章已存在</h3>
    <p id="overwriteMsg">Slug <code id="overwriteSlug"></code> 已存在於 content/posts/。<br>要覆蓋嗎？</p>
    <div class="modal-actions">
      <button class="btn btn-sm" id="overwriteCancelBtn">取消</button>
      <button class="btn btn-sm btn-primary" id="overwriteConfirmBtn">覆蓋並匯入</button>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  connected: false,
  currentPageId: null,
  currentPreview: null,   // { slug, frontmatter, markdownBody, images }
  searchMode: false,
};

// ── Theme ─────────────────────────────────────────────────────────────────────
const themeBtn = document.getElementById("themeBtn");
const savedTheme = localStorage.getItem("theme") || "light";
if (savedTheme === "dark") document.body.classList.add("dark");
themeBtn.textContent = savedTheme === "dark" ? "☀️" : "🌙";
themeBtn.addEventListener("click", () => {
  const isDark = document.body.classList.toggle("dark");
  localStorage.setItem("theme", isDark ? "dark" : "light");
  themeBtn.textContent = isDark ? "☀️" : "🌙";
});

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, type = "loading", duration = 3000) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = `toast ${type} show`;
  if (toastTimer) clearTimeout(toastTimer);
  if (duration > 0) {
    toastTimer = setTimeout(() => el.classList.remove("show"), duration);
  }
}
function hideToast() {
  document.getElementById("toast").classList.remove("show");
}

// ── API helpers ───────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = {
    method,
    headers: { "Content-Type": "application/json" },
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  return r.json();
}

// ── Connect to Notion ─────────────────────────────────────────────────────────
const tokenInput = document.getElementById("tokenInput");
const connectBtn = document.getElementById("connectBtn");
const statusDot = document.getElementById("statusDot");
const statusText = document.getElementById("statusText");
const dbSection = document.getElementById("dbSection");

// Restore token from localStorage
const savedToken = localStorage.getItem("notionToken");
if (savedToken) tokenInput.value = savedToken;

connectBtn.addEventListener("click", async () => {
  const token = tokenInput.value.trim();
  if (!token) return showToast("請輸入 Notion token", "error");

  showToast("連線中...", "loading", 0);
  connectBtn.disabled = true;

  const r = await api("POST", "/api/notion/token", { token });
  connectBtn.disabled = false;

  if (r.error) {
    setStatus(false, r.error);
    showToast(r.error, "error");
    return;
  }

  localStorage.setItem("notionToken", token);
  setStatus(true);
  hideToast();
  loadDatabases();
});

function setStatus(ok, msg) {
  state.connected = ok;
  statusDot.className = `status-dot ${ok ? "ok" : "err"}`;
  statusText.textContent = ok ? "已連線" : (msg || "連線失敗");
  dbSection.style.display = ok ? "block" : "none";
}

// ── Load databases ────────────────────────────────────────────────────────────
const dbSelect = document.getElementById("dbSelect");
const loadPagesBtn = document.getElementById("loadPagesBtn");
const searchModeBtn = document.getElementById("searchModeBtn");
const searchWrap = document.getElementById("searchWrap");
const searchInput = document.getElementById("searchInput");

async function loadDatabases() {
  showToast("載入資料庫中...", "loading", 0);
  const r = await api("GET", "/api/notion/databases");
  hideToast();
  if (r.error) return showToast(r.error, "error");

  dbSelect.innerHTML = '<option value="">— 選擇資料庫 —</option>';
  r.databases.forEach((db) => {
    const opt = document.createElement("option");
    opt.value = db.id;
    opt.textContent = db.title;
    dbSelect.appendChild(opt);
  });

  if (r.databases.length === 0) {
    showToast("未找到任何資料庫，請確認 Integration 權限設定", "error", 5000);
  }
}

loadPagesBtn.addEventListener("click", async () => {
  const dbId = dbSelect.value;
  if (!dbId) return showToast("請先選擇資料庫", "error");
  state.searchMode = false;
  searchWrap.style.display = "none";
  await loadPages(dbId);
});

searchModeBtn.addEventListener("click", () => {
  state.searchMode = true;
  searchWrap.style.display = "block";
  searchInput.focus();
});

let searchTimer = null;
searchInput.addEventListener("input", () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => doSearch(searchInput.value.trim()), 400);
});

async function loadPages(dbId) {
  showToast("載入文章列表中...", "loading", 0);
  const r = await api("GET", `/api/notion/pages?database_id=${encodeURIComponent(dbId)}`);
  hideToast();
  if (r.error) return showToast(r.error, "error");
  renderPageList(r.pages);
}

async function doSearch(query) {
  if (!query) return;
  showToast("搜尋中...", "loading", 0);
  const r = await api("GET", `/api/notion/search?query=${encodeURIComponent(query)}`);
  hideToast();
  if (r.error) return showToast(r.error, "error");
  renderPageList(r.pages);
}

// ── Page list ─────────────────────────────────────────────────────────────────
const pageListWrap = document.getElementById("pageListWrap");
const listEmpty = document.getElementById("listEmpty");

function renderPageList(pages) {
  pageListWrap.innerHTML = "";
  if (!pages.length) {
    const el = document.createElement("div");
    el.className = "empty-state";
    el.textContent = "沒有找到文章";
    pageListWrap.appendChild(el);
    return;
  }

  pages.forEach((page) => {
    const item = document.createElement("div");
    item.className = "page-item";
    item.dataset.id = page.id;

    const date = page.last_edited_time
      ? new Date(page.last_edited_time).toLocaleDateString("zh-TW")
      : "";

    item.innerHTML = `
      <div class="page-item-title" title="${escapeHtml(page.title)}">${escapeHtml(page.title)}</div>
      <div class="page-item-date">${date}</div>
    `;
    item.addEventListener("click", () => selectPage(page.id, page.title, item));
    pageListWrap.appendChild(item);
  });
}

// ── Select & preview page ─────────────────────────────────────────────────────
const previewHeader = document.getElementById("previewHeader");
const previewTitle = document.getElementById("previewTitle");
const previewBody = document.getElementById("previewBody");
const fmEditor = document.getElementById("fmEditor");
const importBtn = document.getElementById("importBtn");
const reloadPreviewBtn = document.getElementById("reloadPreviewBtn");

async function selectPage(pageId, title, itemEl) {
  // Mark active
  document.querySelectorAll(".page-item").forEach((el) => el.classList.remove("active"));
  itemEl.classList.add("active");

  state.currentPageId = pageId;
  previewTitle.textContent = title;
  previewHeader.style.display = "flex";
  previewBody.innerHTML = `<div class="placeholder-state"><div class="icon">⏳</div><div>載入預覽中...</div></div>`;
  fmEditor.classList.remove("visible");

  await loadPreview(pageId);
}

async function loadPreview(pageId) {
  const overrides = getFrontmatterOverrides();
  showToast("轉換中...", "loading", 0);

  const r = await api("POST", "/api/notion/preview", { pageId, overrides });
  hideToast();

  if (r.error) {
    previewBody.innerHTML = `<div class="placeholder-state" style="color:var(--danger)"><div class="icon">❌</div><div>${escapeHtml(r.error)}</div></div>`;
    return;
  }

  state.currentPreview = r;

  // Populate frontmatter editor
  document.getElementById("fmTitle").value = r.frontmatter.title || "";
  document.getElementById("fmSlug").value = r.slug || "";
  document.getElementById("fmDate").value = r.frontmatter.date || "";
  document.getElementById("fmDescription").value = r.frontmatter.description || "";
  document.getElementById("fmTags").value = (r.frontmatter.tags || []).join(", ");
  document.getElementById("fmCategories").value = (r.frontmatter.categories || []).join(", ");
  document.getElementById("fmCover").value = r.frontmatter.cover || "";

  fmEditor.classList.add("visible");

  // Render markdown preview
  const html = marked.parse(r.markdownBody || "");
  previewBody.innerHTML = html;

  // Warn if exists
  if (r.exists) {
    showToast(`⚠️ slug "${r.slug}" 已存在，匯入時會詢問是否覆蓋`, "loading", 5000);
  }
}

reloadPreviewBtn.addEventListener("click", () => {
  if (state.currentPageId) loadPreview(state.currentPageId);
});

function getFrontmatterOverrides() {
  const title = document.getElementById("fmTitle").value.trim();
  const slug = document.getElementById("fmSlug").value.trim();
  const date = document.getElementById("fmDate").value.trim();
  const description = document.getElementById("fmDescription").value.trim();
  const tagsRaw = document.getElementById("fmTags").value.trim();
  const catsRaw = document.getElementById("fmCategories").value.trim();
  const cover = document.getElementById("fmCover").value.trim();

  const overrides = {};
  if (title) overrides.title = title;
  if (slug) overrides.slug = slug;
  if (date) overrides.date = date;
  if (description) overrides.description = description;
  if (tagsRaw) overrides.tags = tagsRaw.split(",").map((s) => s.trim()).filter(Boolean);
  if (catsRaw) overrides.categories = catsRaw.split(",").map((s) => s.trim()).filter(Boolean);
  if (cover) overrides.cover = cover;

  return overrides;
}

// ── Import ─────────────────────────────────────────────────────────────────────
importBtn.addEventListener("click", () => doImport(false));

async function doImport(overwrite) {
  if (!state.currentPageId) return;

  const overrides = getFrontmatterOverrides();
  showToast("匯入中，下載圖片...", "loading", 0);
  importBtn.disabled = true;

  const r = await api("POST", "/api/notion/import", {
    pageId: state.currentPageId,
    overrides,
    overwrite,
  });

  importBtn.disabled = false;

  if (r.error) {
    hideToast();
    showToast(`匯入失敗：${r.error}`, "error", 6000);
    return;
  }

  // Duplicate check
  if (r.exists) {
    hideToast();
    showOverwriteModal(r.slug);
    return;
  }

  // Success
  const warnings = r.failedImages?.length
    ? `（${r.failedImages.length} 張圖片下載失敗，已留 placeholder）`
    : "";

  showToast(`✓ 匯入成功！${warnings} 跳轉編輯器...`, "success", 3000);

  setTimeout(() => {
    window.location.href = r.editorUrl;
  }, 1200);
}

// ── Overwrite modal ───────────────────────────────────────────────────────────
const overwriteModal = document.getElementById("overwriteModal");
const overwriteSlug = document.getElementById("overwriteSlug");
const overwriteCancelBtn = document.getElementById("overwriteCancelBtn");
const overwriteConfirmBtn = document.getElementById("overwriteConfirmBtn");

function showOverwriteModal(slug) {
  overwriteSlug.textContent = slug;
  overwriteModal.classList.add("show");
}

overwriteCancelBtn.addEventListener("click", () => {
  overwriteModal.classList.remove("show");
});

overwriteConfirmBtn.addEventListener("click", () => {
  overwriteModal.classList.remove("show");
  doImport(true);
});

// ── Utils ──────────────────────────────────────────────────────────────────────
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ── Init: check if already connected ─────────────────────────────────────────
(async () => {
  const r = await api("GET", "/api/notion/status");
  if (r.configured) {
    setStatus(true);
    loadDatabases();
  }
})();
</script>
