<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Notion Import</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --background: #fafafa;
  --foreground: #1a1a1a;
  --accent: #3b82f6;
  --accent-dark: #2563eb;
  --muted: #6b7280;
  --border: #e5e7eb;
  --card: #ffffff;
  --sidebar: #f3f4f6;
  --sidebar-w: 300px;
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
}
.dark {
  --background: #0a0a0a;
  --foreground: #e5e5e5;
  --accent: #60a5fa;
  --accent-dark: #3b82f6;
  --muted: #9ca3af;
  --border: #1f2937;
  --card: #111827;
  --sidebar: #0f172a;
}

body {
  background: var(--background);
  color: var(--foreground);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 13px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Topbar ── */
.topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.topbar-title { font-weight: 600; font-size: 13px; color: var(--foreground); margin-right: auto; }
.topbar-title span { color: var(--accent); }
.nav-link {
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 12px;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.15s;
}
.nav-link:hover { border-color: var(--accent); color: var(--accent); }
.theme-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; cursor: pointer; font-size: 14px; }

.btn {
  padding: 5px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--background);
  color: var(--foreground);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover:not(:disabled) { background: var(--accent-dark); border-color: var(--accent-dark); color: #fff; }
.btn-sm { padding: 3px 10px; font-size: 11px; }

/* ── Layout ── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── Left panel ── */
.left-panel {
  width: var(--sidebar-w);
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}
.panel-section { padding: 10px 12px; border-bottom: 1px solid var(--border); }
.panel-section-title { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 3px; }
input[type=text], select {
  width: 100%;
  padding: 6px 8px;
  border: 1px solid var(--border);
  border-radius: 5px;
  background: var(--card);
  color: var(--foreground);
  font-size: 12px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s;
}
input[type=text]:focus, select:focus { border-color: var(--accent); }

.token-row { display: flex; gap: 6px; }
.token-row input { flex: 1; font-family: ui-monospace, monospace; font-size: 11px; }
.status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--muted); margin-right: 5px; }
.status-dot.ok { background: var(--success); }
.status-dot.err { background: var(--danger); }

/* ── Search bar ── */
.search-bar { padding: 8px 12px; border-bottom: 1px solid var(--border); }
.search-bar input { font-size: 12px; }

/* ── Tree view ── */
.tree-wrap { flex: 1; overflow-y: auto; padding: 6px 0; }

.tree-item {
  display: flex;
  align-items: center;
  padding: 5px 12px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background 0.1s;
  gap: 4px;
  user-select: none;
}
.tree-item:hover { background: color-mix(in srgb, var(--accent) 8%, transparent); }
.tree-item.active { border-left-color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
.tree-item.db-node { font-weight: 600; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; cursor: default; }
.tree-item.db-node:hover { background: none; }
.tree-toggle { font-size: 10px; color: var(--muted); width: 14px; flex-shrink: 0; transition: transform 0.15s; }
.tree-toggle.open { transform: rotate(90deg); }
.tree-icon { font-size: 13px; flex-shrink: 0; }
.tree-title { font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tree-date { font-size: 10px; color: var(--muted); flex-shrink: 0; }
.tree-children { display: none; }
.tree-children.open { display: block; }
.tree-indent { padding-left: 16px; }

.empty-state { padding: 20px 12px; text-align: center; color: var(--muted); font-size: 12px; line-height: 1.6; }

/* ── Right panel ── */
.right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.preview-header {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--card);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.preview-title { font-weight: 600; font-size: 14px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Frontmatter editor ── */
.fm-editor {
  background: var(--sidebar);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: none;
  flex-shrink: 0;
}
.fm-editor.visible { display: block; }
.fm-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.fm-grid-full { grid-column: 1 / -1; }
.fm-field label { font-size: 10px; color: var(--muted); display: block; margin-bottom: 3px; }
.fm-field input { font-size: 11px; }

/* ── Chip tag input (same as post-editor) ── */
.tag-container {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding: 4px 6px;
  border: 1px solid var(--border);
  border-radius: 5px;
  background: var(--card);
  min-height: 30px;
  cursor: text;
}
.tag-container:focus-within { border-color: var(--accent); }
.tag-chip {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 1px 7px;
  border-radius: 99px;
  background: color-mix(in srgb, var(--accent) 15%, transparent);
  color: var(--accent);
  font-size: 11px;
  border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
}
.tag-chip button { background: none; border: none; cursor: pointer; color: var(--accent); font-size: 12px; padding: 0; line-height: 1; opacity: 0.7; }
.tag-chip button:hover { opacity: 1; }
.tag-input-inner {
  border: none !important;
  outline: none !important;
  background: transparent !important;
  padding: 1px 3px !important;
  width: 80px !important;
  min-width: 50px;
  font-size: 11px;
  color: var(--foreground);
}

/* ── Preview body ── */
.preview-body { flex: 1; overflow-y: auto; padding: 24px 32px; }
.preview-body.prose { max-width: 720px; margin: 0 auto; }
.preview-body h1, .preview-body h2, .preview-body h3 { margin: 1.2em 0 0.4em; font-weight: 600; }
.preview-body h1 { font-size: 1.5em; }
.preview-body h2 { font-size: 1.25em; }
.preview-body h3 { font-size: 1.1em; }
.preview-body p { margin-bottom: 0.9em; line-height: 1.7; }
.preview-body code { background: color-mix(in srgb, var(--accent) 10%, transparent); padding: 1px 5px; border-radius: 3px; font-size: 0.88em; font-family: ui-monospace, monospace; }
.preview-body pre { background: #1e1e1e; color: #d4d4d4; padding: 12px 16px; border-radius: 6px; overflow-x: auto; margin-bottom: 1em; }
.preview-body pre code { background: none; padding: 0; color: inherit; }
.preview-body blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--muted); margin-bottom: 1em; }
.preview-body img { max-width: 100%; border-radius: 6px; }
.preview-body ul, .preview-body ol { padding-left: 1.5em; margin-bottom: 0.9em; }
.preview-body li { line-height: 1.6; }
.preview-body hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }
.preview-body a { color: var(--accent); }

.placeholder-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--muted); gap: 10px; font-size: 13px; }
.placeholder-state .icon { font-size: 36px; opacity: 0.4; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 20px; right: 20px;
  padding: 10px 16px; border-radius: 8px;
  background: var(--card); border: 1px solid var(--border);
  box-shadow: 0 4px 16px rgba(0,0,0,0.1); font-size: 12px;
  z-index: 100; max-width: 380px;
  opacity: 0; transform: translateY(8px);
  transition: all 0.2s; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
.toast.success { border-color: var(--success); color: var(--success); }
.toast.error { border-color: var(--danger); color: var(--danger); }
.toast.loading { border-color: var(--accent); color: var(--accent); }

/* ── Modal ── */
.modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
.modal-backdrop.show { display: flex; }
.modal { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; max-width: 420px; width: 90%; }
.modal h3 { margin-bottom: 10px; font-size: 14px; }
.modal p { color: var(--muted); font-size: 12px; margin-bottom: 16px; line-height: 1.6; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">Dev Tools / <span>Notion Import</span></div>
  <a class="nav-link" href="/editor">← Post Editor</a>
  <button class="theme-btn" id="themeBtn">🌙</button>
</div>

<div class="layout">

  <!-- ── Left panel ── -->
  <div class="left-panel">

    <div class="panel-section">
      <div class="panel-section-title">Notion 連線</div>
      <div class="token-row">
        <input type="text" id="tokenInput" placeholder="ntn_xxxx..." />
        <button class="btn btn-sm btn-primary" id="connectBtn">連線</button>
      </div>
      <div style="margin-top:8px;display:flex;align-items:center;font-size:11px;color:var(--muted);">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">未連線</span>
      </div>
    </div>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="搜尋頁面..." disabled />
    </div>

    <div class="tree-wrap" id="treeWrap">
      <div class="empty-state" id="treeEmpty">連線後會顯示 Notion 頁面階層</div>
    </div>

  </div>

  <!-- ── Right panel ── -->
  <div class="right-panel">

    <div class="preview-header" id="previewHeader" style="display:none;">
      <div class="preview-title" id="previewTitle">—</div>
      <button class="btn btn-sm" id="reloadBtn">重新載入</button>
      <button class="btn btn-sm btn-primary" id="importBtn">匯入到 Blog →</button>
    </div>

    <!-- Frontmatter editor -->
    <div class="fm-editor" id="fmEditor">
      <div class="fm-grid">
        <div class="fm-field">
          <label>標題</label>
          <input type="text" id="fmTitle" />
        </div>
        <div class="fm-field">
          <label>Slug（檔名）</label>
          <input type="text" id="fmSlug" style="font-family:ui-monospace,monospace;" />
        </div>
        <div class="fm-field">
          <label>日期</label>
          <input type="text" id="fmDate" placeholder="YYYY-MM-DD" />
        </div>
        <div class="fm-field fm-grid-full">
          <label>Description</label>
          <input type="text" id="fmDescription" />
        </div>
        <div class="fm-field">
          <label>Categories</label>
          <div class="tag-container" id="cat-container" onclick="document.getElementById('cat-input').focus()">
            <datalist id="cat-datalist"></datalist>
            <input type="text" id="cat-input" class="tag-input-inner" placeholder="輸入後 Enter" list="cat-datalist"
              onkeydown="handleTagKey(event,'cat')" onchange="handleTagChange(event,'cat')" />
          </div>
        </div>
        <div class="fm-field">
          <label>Tags</label>
          <div class="tag-container" id="tag-container" onclick="document.getElementById('tag-input').focus()">
            <datalist id="tag-datalist"></datalist>
            <input type="text" id="tag-input" class="tag-input-inner" placeholder="輸入後 Enter" list="tag-datalist"
              onkeydown="handleTagKey(event,'tag')" onchange="handleTagChange(event,'tag')" />
          </div>
        </div>
        <div class="fm-field">
          <label>Cover 圖片檔名</label>
          <div style="display:flex;align-items:center;border:1px solid var(--border);border-radius:5px;background:var(--card);overflow:hidden;transition:border-color 0.15s;" onfocusin="this.style.borderColor='var(--accent)'" onfocusout="this.style.borderColor='var(--border)'">
            <span style="padding:5px 6px;font-size:10px;color:var(--muted);white-space:nowrap;border-right:1px solid var(--border);background:color-mix(in srgb,var(--border) 30%,transparent);flex-shrink:0;">/images/posts/covers/</span>
            <input type="text" id="fmCover" placeholder="my-cover.png" style="border:none;border-radius:0;flex:1;min-width:0;" />
          </div>
        </div>
      </div>
    </div>

    <div class="preview-body prose" id="previewBody">
      <div class="placeholder-state">
        <div class="icon">📄</div>
        <div>從左側選擇一篇 Notion 文章開始預覽</div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Overwrite modal -->
<div class="modal-backdrop" id="overwriteModal">
  <div class="modal">
    <h3>⚠️ 文章已存在</h3>
    <p>Slug <code id="overwriteSlug"></code> 已存在，要覆蓋嗎？</p>
    <div class="modal-actions">
      <button class="btn btn-sm" id="overwriteCancelBtn">取消</button>
      <button class="btn btn-sm btn-primary" id="overwriteConfirmBtn">覆蓋並匯入</button>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let currentPageId = null;
let importCategories = [];
let importTags = [];
let allCategories = [];
let allTags = [];

// ── Theme ─────────────────────────────────────────────────────────────────────
const themeBtn = document.getElementById("themeBtn");
const savedTheme = localStorage.getItem("niTheme") || "light";
if (savedTheme === "dark") document.body.classList.add("dark");
themeBtn.textContent = savedTheme === "dark" ? "☀️" : "🌙";
themeBtn.addEventListener("click", () => {
  const isDark = document.body.classList.toggle("dark");
  localStorage.setItem("niTheme", isDark ? "dark" : "light");
  themeBtn.textContent = isDark ? "☀️" : "🌙";
});

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, type = "loading", duration = 3000) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = `toast ${type} show`;
  if (toastTimer) clearTimeout(toastTimer);
  if (duration > 0) toastTimer = setTimeout(() => el.classList.remove("show"), duration);
}
function hideToast() { document.getElementById("toast").classList.remove("show"); }

// ── API ────────────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  return r.json();
}

// ── Tag chip logic (same as post-editor) ─────────────────────────────────────
function handleTagKey(e, type) {
  if (e.key === "Enter" || e.key === ",") {
    e.preventDefault();
    const val = e.target.value.trim().replace(/,$/, "");
    if (!val) return;
    addTag(type, val);
    e.target.value = "";
  }
  if (e.key === "Backspace" && !e.target.value) {
    if (type === "cat" && importCategories.length) { importCategories.pop(); renderTags("cat"); }
    else if (type === "tag" && importTags.length) { importTags.pop(); renderTags("tag"); }
  }
}
function handleTagChange(e, type) {
  const val = e.target.value.trim();
  if (!val) return;
  addTag(type, val);
  e.target.value = "";
}
function addTag(type, val) {
  if (type === "cat") { if (!importCategories.includes(val)) { importCategories.push(val); renderTags("cat"); } }
  else { if (!importTags.includes(val)) { importTags.push(val); renderTags("tag"); } }
}
function removeTag(type, i) {
  if (type === "cat") importCategories.splice(i, 1);
  else importTags.splice(i, 1);
  renderTags(type);
}
function renderTags(type) {
  const arr = type === "cat" ? importCategories : importTags;
  const container = document.getElementById(`${type}-container`);
  const input = document.getElementById(`${type}-input`);
  container.querySelectorAll(".tag-chip").forEach(el => el.remove());
  arr.forEach((val, i) => {
    const chip = document.createElement("span");
    chip.className = "tag-chip";
    chip.innerHTML = `${escHtml(val)}<button onclick="removeTag('${type}',${i})">×</button>`;
    container.insertBefore(chip, input);
  });
}
function setTagsFromArray(type, arr) {
  if (type === "cat") importCategories = [...arr];
  else importTags = [...arr];
  renderTags(type);
}

// ── Connect ────────────────────────────────────────────────────────────────────
const tokenInput = document.getElementById("tokenInput");
const connectBtn = document.getElementById("connectBtn");

const savedToken = localStorage.getItem("notionToken");
if (savedToken) tokenInput.value = savedToken;

connectBtn.addEventListener("click", async () => {
  const token = tokenInput.value.trim();
  if (!token) return showToast("請輸入 Notion token", "error");
  showToast("連線中...", "loading", 0);
  connectBtn.disabled = true;
  const r = await api("POST", "/api/notion/token", { token });
  connectBtn.disabled = false;
  if (r.error) { setStatus(false, r.error); showToast(r.error, "error"); return; }
  localStorage.setItem("notionToken", token);
  setStatus(true);
  hideToast();
  loadTree();
});

function setStatus(ok, msg) {
  document.getElementById("statusDot").className = `status-dot ${ok ? "ok" : "err"}`;
  document.getElementById("statusText").textContent = ok ? "已連線" : (msg || "連線失敗");
  document.getElementById("searchInput").disabled = !ok;
}

// ── Tree ───────────────────────────────────────────────────────────────────────
async function loadTree() {
  showToast("載入中...", "loading", 0);
  const r = await api("GET", "/api/notion/databases");
  hideToast();
  if (r.error) return showToast(r.error, "error");

  renderTree(r.items || []);
}

function buildTree(items) {
  const map = {};
  items.forEach(item => { map[item.id] = { ...item, children: [] }; });

  const roots = [];
  items.forEach(item => {
    if (item.parentId && map[item.parentId]) {
      map[item.parentId].children.push(map[item.id]);
    } else {
      roots.push(map[item.id]);
    }
  });
  return roots;
}

function renderTree(items) {
  const wrap = document.getElementById("treeWrap");
  if (!items.length) {
    wrap.innerHTML = '<div class="empty-state">未找到任何頁面。<br>請確認 Notion 頁面已加入 Integration 的 Connections。</div>';
    return;
  }

  const roots = buildTree(items);
  wrap.innerHTML = "";
  roots.forEach(node => wrap.appendChild(createTreeNode(node, 0)));
}

function createTreeNode(node, depth) {
  const isDb = node.object === "database";
  const hasChildren = node.children && node.children.length > 0;

  const wrap = document.createElement("div");

  // Item row
  const row = document.createElement("div");
  row.className = "tree-item" + (isDb ? " db-node" : "");
  row.style.paddingLeft = `${12 + depth * 14}px`;

  const toggle = document.createElement("span");
  toggle.className = "tree-toggle";
  toggle.textContent = hasChildren ? "▶" : " ";

  const icon = document.createElement("span");
  icon.className = "tree-icon";
  icon.textContent = isDb ? "🗃" : "📄";

  const title = document.createElement("span");
  title.className = "tree-title";
  title.title = node.title;
  title.textContent = node.title;

  row.appendChild(toggle);
  row.appendChild(icon);
  row.appendChild(title);

  if (node.last_edited_time && !isDb) {
    const date = document.createElement("span");
    date.className = "tree-date";
    date.textContent = new Date(node.last_edited_time).toLocaleDateString("zh-TW");
    row.appendChild(date);
  }

  wrap.appendChild(row);

  // Children container
  let childrenEl = null;
  if (hasChildren) {
    childrenEl = document.createElement("div");
    childrenEl.className = "tree-children";
    node.children.forEach(child => childrenEl.appendChild(createTreeNode(child, depth + 1)));
    wrap.appendChild(childrenEl);
  }

  // Click handlers
  if (isDb && hasChildren) {
    row.style.cursor = "pointer";
    row.addEventListener("click", () => {
      const isOpen = childrenEl.classList.toggle("open");
      toggle.classList.toggle("open", isOpen);
    });
    // Auto-expand databases at root level
    if (depth === 0) {
      childrenEl.classList.add("open");
      toggle.classList.add("open");
    }
  } else if (!isDb) {
    row.addEventListener("click", () => {
      document.querySelectorAll(".tree-item").forEach(el => el.classList.remove("active"));
      row.classList.add("active");
      selectPage(node.id, node.title);
    });
  }

  return wrap;
}

// ── Search ────────────────────────────────────────────────────────────────────
let searchTimer = null;
document.getElementById("searchInput").addEventListener("input", (e) => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (!q) return loadTree();
  searchTimer = setTimeout(() => doSearch(q), 400);
});

async function doSearch(query) {
  showToast("搜尋中...", "loading", 0);
  const r = await api("GET", `/api/notion/search?query=${encodeURIComponent(query)}`);
  hideToast();
  if (r.error) return showToast(r.error, "error");
  renderTree(r.pages.map(p => ({ ...p, object: "page", parentId: null, children: [] })));
}

// ── Preview ────────────────────────────────────────────────────────────────────
async function selectPage(pageId, title) {
  currentPageId = pageId;
  document.getElementById("previewTitle").textContent = title;
  document.getElementById("previewHeader").style.display = "flex";
  document.getElementById("fmEditor").classList.remove("visible");
  document.getElementById("previewBody").innerHTML =
    `<div class="placeholder-state"><div class="icon">⏳</div><div>轉換中...</div></div>`;
  await loadPreview(pageId);
}

async function loadPreview(pageId) {
  showToast("轉換中...", "loading", 0);
  const r = await api("POST", "/api/notion/preview", {
    pageId,
    overrides: getFrontmatterOverrides(),
  });
  hideToast();

  if (r.error) {
    document.getElementById("previewBody").innerHTML =
      `<div class="placeholder-state" style="color:var(--danger)"><div class="icon">❌</div><div>${escHtml(r.error)}</div></div>`;
    return;
  }

  // Fill frontmatter fields
  document.getElementById("fmTitle").value = r.frontmatter.title || "";
  document.getElementById("fmSlug").value = r.slug || "";
  document.getElementById("fmDate").value = r.frontmatter.date || "";
  document.getElementById("fmDescription").value = r.frontmatter.description || "";
  // Show only filename in the input (prefix is fixed)
  const coverFull = r.frontmatter.cover || "";
  document.getElementById("fmCover").value = coverFull.replace("/images/posts/covers/", "");
  setTagsFromArray("cat", r.frontmatter.categories || []);
  setTagsFromArray("tag", r.frontmatter.tags || []);

  document.getElementById("fmEditor").classList.add("visible");
  document.getElementById("previewBody").innerHTML = marked.parse(r.markdownBody || "");

  if (r.exists) showToast(`⚠ slug "${r.slug}" 已存在，匯入時會詢問覆蓋`, "loading", 5000);
}

document.getElementById("reloadBtn").addEventListener("click", () => {
  if (currentPageId) loadPreview(currentPageId);
});

function getFrontmatterOverrides() {
  const title = document.getElementById("fmTitle").value.trim();
  const slug  = document.getElementById("fmSlug").value.trim();
  const date  = document.getElementById("fmDate").value.trim();
  const desc  = document.getElementById("fmDescription").value.trim();
  const coverFilename = document.getElementById("fmCover").value.trim();
  const cover = coverFilename ? `/images/posts/covers/${coverFilename}` : "";
  const o = {};
  if (title) o.title = title;
  if (slug)  o.slug  = slug;
  if (date)  o.date  = date;
  if (desc)  o.description = desc;
  if (cover) o.cover = cover;
  if (importCategories.length) o.categories = [...importCategories];
  if (importTags.length)       o.tags = [...importTags];
  return o;
}

// ── Import ─────────────────────────────────────────────────────────────────────
document.getElementById("importBtn").addEventListener("click", () => doImport(false));

async function doImport(overwrite) {
  if (!currentPageId) return;
  showToast("匯入中，下載圖片...", "loading", 0);
  document.getElementById("importBtn").disabled = true;

  const r = await api("POST", "/api/notion/import", {
    pageId: currentPageId,
    overrides: getFrontmatterOverrides(),
    overwrite,
  });

  document.getElementById("importBtn").disabled = false;

  if (r.error) { hideToast(); showToast(`匯入失敗：${r.error}`, "error", 6000); return; }
  if (r.exists) { hideToast(); showOverwriteModal(r.slug); return; }

  const warn = r.failedImages?.length
    ? `（${r.failedImages.length} 張圖片下載失敗，已留 placeholder）` : "";
  showToast(`✓ 匯入成功！${warn} 跳轉編輯器...`, "success", 3000);
  setTimeout(() => { window.location.href = r.editorUrl; }, 1200);
}

// ── Overwrite modal ────────────────────────────────────────────────────────────
function showOverwriteModal(slug) {
  document.getElementById("overwriteSlug").textContent = slug;
  document.getElementById("overwriteModal").classList.add("show");
}
document.getElementById("overwriteCancelBtn").addEventListener("click", () => {
  document.getElementById("overwriteModal").classList.remove("show");
});
document.getElementById("overwriteConfirmBtn").addEventListener("click", () => {
  document.getElementById("overwriteModal").classList.remove("show");
  doImport(true);
});

// ── Utils ─────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  // Load existing tags/categories for datalist
  try {
    const posts = await fetch("/api/posts").then(r => r.json());
    allCategories = [...new Set(posts.flatMap(p => p.categories || []))].filter(Boolean);
    allTags = [...new Set(posts.flatMap(p => p.tags || []))].filter(Boolean);

    const catList = document.getElementById("cat-datalist");
    allCategories.forEach(c => { const o = document.createElement("option"); o.value = c; catList.appendChild(o); });
    const tagList = document.getElementById("tag-datalist");
    allTags.forEach(t => { const o = document.createElement("option"); o.value = t; tagList.appendChild(o); });
  } catch (_) {}

  // Check if already connected (token loaded from .env.local)
  const r = await api("GET", "/api/notion/status");
  if (r.configured) {
    setStatus(true);
    loadTree();
  }
})();
</script>
